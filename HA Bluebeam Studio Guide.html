  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

">Date<\u002Fdiv>\n      <div style=\"padding:6px 12px;font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08);\">Description<\u002Fdiv>\n      <div style=\"padding:6px 12px;font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08);\">Status<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:50px 90px 1fr 140px;background:rgba(37,104,184,0.15);\">\n      <div style=\"padding:7px 12px;font-size:12px;font-weight:700;color:#7EB8E8;\">1.0<\u002Fdiv>\n      <div style=\"padding:7px 12px;font-size:12px;color:rgba(255,255,255,0.7);\">Jun 2025<\u002Fdiv>\n      <div style=\"padding:7px 12px;font-size:12px;color:rgba(255,255,255,0.7);\">Initial release — Bluebeam Studio Self-Help Guide<\u002Fdiv>\n      <div style=\"padding:7px 12px;display:flex;align-items:center;gap:6px;\"><div style=\"width:6px;height:6px;background:#4ADE80;border-radius:50%;\"><\u002Fdiv><span style=\"font-size:11px;font-weight:600;color:#4ADE80;\">Current<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:50px 90px 1fr 140px;background:rgba(0,0,0,0.1);border-top:1px solid rgba(255,255,255,0.05);\">\n      <div style=\"padding:7px 12px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.3);\">—<\u002Fdiv>\n      <div style=\"padding:7px 12px;font-size:12px;color:rgba(255,255,255,0.3);\">—<\u002Fdiv>\n      <div style=\"padding:7px 12px;font-size:12px;color:rgba(255,255,255,0.3);\">Draft<\u002Fdiv>\n      <div style=\"padding:7px 12px;font-size:12px;color:rgba(255,255,255,0.25);\">Superseded<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:rgba(0,0,0,0.2);padding:14px 60px;z-index:1;display:flex;align-items:center;gap:12px;\">\n    <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><rect x=\"1\" y=\"1\" width=\"7\" height=\"7\" rx=\"1\" fill=\"#2568B8\"><\u002Frect><rect x=\"10\" y=\"1\" width=\"7\" height=\"7\" rx=\"1\" fill=\"#2568B8\" opacity=\"0.5\"><\u002Frect><rect x=\"1\" y=\"10\" width=\"7\" height=\"7\" rx=\"1\" fill=\"#2568B8\" opacity=\"0.5\"><\u002Frect><rect x=\"10\" y=\"10\" width=\"7\" height=\"7\" rx=\"1\" fill=\"#2568B8\" opacity=\"0.3\"><\u002Frect><\u002Fsvg>\n    <span style=\"color:rgba(255,255,255,0.35);font-size:11px;\">Hopkins Architects Dubai Limited · BIM Standards Library<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- BODY -->\n<main class=\"doc\">\n\n  <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:14px;margin-bottom:36px;border-bottom:2px solid #1B3558;\">\n    <span style=\"font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:700;color:#1B3558;letter-spacing:1.5px;text-transform:uppercase;\">Revu Bluebeam Studio Guide<\u002Fspan>\n    <span style=\"font-family:'Montserrat',sans-serif;font-size:10.5px;color:#8FA4BC;\">Prashanth Perumal · Version 1.0 · June 2025<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- What is Bluebeam -->\n  <div style=\"background:#EEF3FA;border-left:4px solid #2568B8;border-radius:0 8px 8px 0;padding:18px 22px;margin-bottom:36px;\">\n    <h3 style=\"font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#2568B8;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px;\">What is Bluebeam Studio?<\u002Fh3>\n    <p style=\"font-size:14.5px;line-height:1.7;color:#1B2E45;margin:0;\">Bluebeam Studio is a <strong>cloud-based collaboration platform<\u002Fstrong> integrated within Bluebeam Revu. It allows design consultants to host sessions, share and review design documents, and collaborate in real-time with project stakeholders. Studio Sessions enable multi-user interaction where participants can view and respond to markups immediately — ideal for managing complex design reviews and ensuring seamless communication across teams.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- System requirements -->\n  <section style=\"margin-bottom:40px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px;\">\n      <div style=\"width:34px;height:34px;background:#1B3558;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span style=\"color:white;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;\">1<\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-size:19px;font-weight:700;color:#1B3558;\">Getting Started<\u002Fh2>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13.5px;font-weight:700;color:#1B3558;margin:0 0 10px;\">System Requirements<\u002Fh3>\n    <p style=\"font-size:14px;line-height:1.7;color:#2C3E50;margin:0 0 16px;\">Before using Bluebeam Studio, ensure your setup meets these requirements:<\u002Fp>\n    <div style=\"display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;\">\n      <div style=\"background:#F7F9FC;border:1px solid #D0DCE8;border-radius:7px;padding:12px 16px;flex:1;min-width:160px;\"><div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#2568B8;margin-bottom:5px;text-transform:uppercase;\">OS<\u002Fdiv><div style=\"font-size:13.5px;color:#2C3E50;\">Windows or macOS<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F7F9FC;border:1px solid #D0DCE8;border-radius:7px;padding:12px 16px;flex:1;min-width:160px;\"><div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#2568B8;margin-bottom:5px;text-transform:uppercase;\">Software<\u002Fdiv><div style=\"font-size:13.5px;color:#2C3E50;\">Bluebeam Revu (licensed)<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F7F9FC;border:1px solid #D0DCE8;border-radius:7px;padding:12px 16px;flex:1;min-width:160px;\"><div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#2568B8;margin-bottom:5px;text-transform:uppercase;\">Connection<\u002Fdiv><div style=\"font-size:13.5px;color:#2C3E50;\">Active internet connection<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F7F9FC;border:1px solid #D0DCE8;border-radius:7px;padding:12px 16px;flex:1;min-width:160px;\"><div style=\"font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#2568B8;margin-bottom:5px;text-transform:uppercase;\">Account<\u002Fdiv><div style=\"font-size:13.5px;color:#2C3E50;\">Bluebeam Studio account<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13.5px;font-weight:700;color:#1B3558;margin:0 0 12px;\">Creating a Bluebeam Studio Account<\u002Fh3>\n    <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n      <ol style=\"font-size:14px;line-height:1.9;color:#2C3E50;margin:0;padding-left:22px;flex:1;\">\n        <li>Open Bluebeam Revu and navigate to the <strong>Studio panel<\u002Fstrong> (icon on the left sidebar)<\u002Fli>\n        <li>Click <strong>\"Sign In\"<\u002Fstrong> — the Studio sign-in panel will open<\u002Fli>\n        <li>Click <strong>\"Sign Up\"<\u002Fstrong> if you don't have an account, enter your Bluebeam ID (email), create a password, and complete the required details<\u002Fli>\n        <li>Verify your email to activate the account before proceeding<\u002Fli>\n      <\u002Fol>\n      <div style=\"display:flex;gap:10px;flex-shrink:0;\">\n        <div style=\"border:2px solid #2568B8;border-radius:7px;overflow:hidden;\">\n          <img src=\"e56fefec-024c-49c5-901f-cb85e6fd168a\" alt=\"Bluebeam Studio panel — Sign In button\" style=\"height:250px;display:block;\">\n        <\u002Fdiv>\n        <div style=\"border:2px solid #2568B8;border-radius:7px;overflow:hidden;\">\n          <img src=\"180a7cfc-dc4c-493c-93f6-b0ef14b0477f\" alt=\"Bluebeam sign-in dialog with email field and Sign Up link\" style=\"height:250px;display:block;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Using Studio Sessions -->\n  <section style=\"margin-bottom:40px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n      <div style=\"width:34px;height:34px;background:#1B3558;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span style=\"color:white;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;\">2<\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-size:19px;font-weight:700;color:#1B3558;\">Using Studio Sessions<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px;margin-bottom:16px;\">\n      <!-- Hosting -->\n      <div style=\"border:1px solid #D0DCE8;border-radius:8px;overflow:hidden;\">\n        <div style=\"background:#1B3558;padding:12px 16px;\"><span style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.5px;\">Hosting a New Session<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;padding:16px;display:flex;flex-direction:column;gap:14px;\">\n          <ol style=\"font-size:13.5px;line-height:1.85;color:#2C3E50;margin:0;padding-left:18px;\">\n            <li>In the Studio panel, click the <strong>+<\u002Fstrong> button and select <strong>\"New Session\"<\u002Fstrong><\u002Fli>\n            <li>Enter a <strong>Session Name<\u002Fstrong>, add documents using the <strong>Add<\u002Fstrong> button<\u002Fli>\n            <li>Set <strong>Permissions<\u002Fstrong> (Save As, Print, Markup, Add Documents etc.) to control access<\u002Fli>\n            <li>Invite collaborators by sharing the <strong>session ID<\u002Fstrong> or email invitation<\u002Fli>\n          <\u002Fol>\n          <div style=\"display:flex;gap:16px;align-items:flex-start;\">\n            <div style=\"border:1.5px solid #1B3558;border-radius:6px;overflow:hidden;flex:1;\">\n              <img src=\"b13d2e1c-93b9-49eb-a0a4-94deb043f2a7\" alt=\"Studio panel showing + button with New Session option\" style=\"width:100%;display:block;\">\n            <\u002Fdiv>\n            <div style=\"border:1.5px solid #1B3558;border-radius:6px;overflow:hidden;flex:1.4;\">\n              <img src=\"ae9b0350-1fcd-412d-8167-c7d772a4be9e\" alt=\"Start Studio Session dialog — Session Name, Add documents, Permissions\" style=\"width:100%;display:block;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Joining -->\n      <div style=\"border:1px solid #D0DCE8;border-radius:8px;overflow:hidden;\">\n        <div style=\"background:#2568B8;padding:12px 16px;\"><span style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.5px;\">Joining a Session<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;padding:16px;display:flex;flex-direction:column;gap:14px;\">\n          <ol style=\"font-size:13.5px;line-height:1.85;color:#2C3E50;margin:0;padding-left:18px;\">\n            <li>In the Studio panel, click <strong>+<\u002Fstrong> and select <strong>\"Join\"<\u002Fstrong><\u002Fli>\n            <li>Enter the <strong>Studio ID<\u002Fstrong> provided by the session host and click OK<\u002Fli>\n            <li>Use the markup tools to annotate, comment, and make changes to documents<\u002Fli>\n            <li>All changes are <strong>auto-saved<\u002Fstrong> — Bluebeam records all activity for accountability<\u002Fli>\n          <\u002Fol>\n          <div style=\"display:flex;gap:16px;align-items:flex-start;\">\n            <div style=\"border:1.5px solid #2568B8;border-radius:6px;overflow:hidden;flex:1.4;\">\n              <img src=\"f3848db8-d12e-4164-8f86-78cc3923c625\" alt=\"Studio panel showing Join option\" style=\"width:100%;display:block;\">\n            <\u002Fdiv>\n            <div style=\"border:1.5px solid #2568B8;border-radius:6px;overflow:hidden;flex:1;\">\n              <img src=\"7f61f4ec-3952-4bad-af0a-f6d6bcdaf2fd\" alt=\"Join dialog with Studio ID field\" style=\"width:100%;display:block;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Best Practices -->\n  <section style=\"margin-bottom:40px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\">\n      <div style=\"width:34px;height:34px;background:#1B3558;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span style=\"color:white;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;\">3<\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-size:19px;font-weight:700;color:#1B3558;\">Best Practices<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n      <div style=\"background:#F2FBF4;border:1px solid #C0DEC8;border-radius:8px;padding:16px 18px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1F7A3B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;\">Session Naming<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#1A3D25;margin:0;\">Use clear, consistent naming conventions for sessions. Prefix uploaded files with the date in <strong>YYMMDD format<\u002Fstrong> before uploading (e.g. 250625_Drawing_Review).<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#F2FBF4;border:1px solid #C0DEC8;border-radius:8px;padding:16px 18px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1F7A3B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;\">Permissions<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#1A3D25;margin:0;\">Define permissions carefully. Restrict sensitive documents to authorised personnel and provide editing rights only when necessary.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#F2FBF4;border:1px solid #C0DEC8;border-radius:8px;padding:16px 18px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1F7A3B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;\">Markup Layers<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#1A3D25;margin:0;\">Use <strong>layers<\u002Fstrong> for different annotation types. Apply stamps for approvals and assign each user a specific colour for clearer design document reviews.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#F2FBF4;border:1px solid #C0DEC8;border-radius:8px;padding:16px 18px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1F7A3B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;\">Regular Backups<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#1A3D25;margin:0;\">Although Studio provides cloud storage, <strong>periodically download copies<\u002Fstrong> of critical design documents to your local project folder as a backup.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Advanced Features -->\n  <section style=\"margin-bottom:40px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px;\">\n      <div style=\"width:34px;height:34px;background:#1B3558;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><span style=\"color:white;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;\">4<\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-size:19px;font-weight:700;color:#1B3558;\">Advanced Features<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n      <div style=\"background:#EEF3FA;border:1px solid #C5D6EA;border-radius:8px;padding:16px 18px;flex:1;min-width:200px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1B3558;margin-bottom:8px;\">Mobile Access<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#2C3E50;margin:0;\">Revu is available on <strong>iOS and Android<\u002Fstrong>. Download the Bluebeam app to stay connected with Studio during site visits or remote meetings.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#EEF3FA;border:1px solid #C5D6EA;border-radius:8px;padding:16px 18px;flex:1;min-width:200px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1B3558;margin-bottom:8px;\">Markup Summary Reports<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#2C3E50;margin:0;\">Export markup summaries to <strong>PDF or CSV<\u002Fstrong> to track review comments, responses, and outstanding actions across the team.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#EEF3FA;border:1px solid #C5D6EA;border-radius:8px;padding:16px 18px;flex:1;min-width:200px;\">\n        <div style=\"font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:#1B3558;margin-bottom:8px;\">Custom Tool Sets<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.65;color:#2C3E50;margin:0;\">Build <strong>project-specific tool sets<\u002Fstrong> with predefined stamps, symbols, and text boxes to standardise the review process across all sessions.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Closing -->\n  <div style=\"background:linear-gradient(135deg,#1B3558 0%,#2568B8 100%);border-radius:10px;padding:22px 26px;\">\n    <div style=\"display:flex;gap:14px;align-items:flex-start;\">\n      <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\" style=\"flex-shrink:0;margin-top:2px;\"><circle cx=\"14\" cy=\"14\" r=\"12\" fill=\"rgba(255,255,255,0.15)\"><\u002Fcircle><path d=\"M8.5 14L12 17.5L19.5 10\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <p style=\"font-size:14px;line-height:1.68;color:rgba(255,255,255,0.9);margin:0;\">For questions about Bluebeam Studio setup, session hosting, or permissions, contact the BIM Team at <strong style=\"color:#7EB8E8;\">prashanth.p@hopkins.ae<\u002Fstrong>. Always use Studio Sessions for formal design review cycles — do not share raw PDFs via email for mark-up purposes.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"border-top:1px solid #D0DCE8;padding-top:14px;margin-top:36px;display:flex;justify-content:space-between;align-items:center;\">\n    <span style=\"font-family:'Montserrat',sans-serif;font-size:10.5px;color:#9AAABB;\">Hopkins Architects · Internal Use Only<\u002Fspan>\n    <span style=\"font-family:'Montserrat',sans-serif;font-size:10.5px;color:#9AAABB;\">Bluebeam Studio Guide · Version A · June 2025<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fmain>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
